<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherApp</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="left">
        <div class="searchbar">
            <input id="search_input" type="text" placeholder="Search your location">
        </div>


        <div class="local_time">
            <span id="day"></span>
            <span id="date"></span>
        </div>

        <section class="current_temperature">
            <div class="location">
                <span id="city"></span>
                <span id="comma">,</span>
                <span id="region"></span>
                <span id="comma">,</span>
                <span id="country"></span>
            </div>

            <div class="temp">
                <div id="temp_C"></div>
                <div id="visibility"></div>
                <div id="temp_F"></div>
            </div>
        </section>

        <section class="temp_credentials">
            <div class="box">
                <span class="box1">Humidity</span>
                <span id="humidity"></span>
            </div>
            <div class=" box">
                <span class="box1">Wind Status</span>
                <span id="wind_status"></span>
            </div>
            <div class="box">
                <span class="box1">Feels Like</span>
                <span id="feels_like"></span>
            </div>
            <div class="box">
                <span class="box1">Heat Index</span>
                <span id="heatindex_c"></span>
            </div>
            <div class="box">
                <span class="box1">Latitude</span>
                <span id="lat"></span>
            </div>
            <div class="box">
                <span class="box1">Longitude</span>
                <span id="lon"></span>
            </div>
        </section>
    </div>


    <div class="right">
        <div class="forecast">Forecast</div>
    </div>




    <script src="script.js"></script>
</body>

</html>
